name: Post-Merge Release Build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: post-merge-release-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release-bundles:
    permissions:
      contents: read
    env:
      HAS_APPLE_RELEASE_SIGNING: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.KEYCHAIN_PASSWORD != '' && secrets.APPLE_ID != '' && secrets.APPLE_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
      HAS_WINDOWS_SIGNING: ${{ secrets.WINDOWS_CERTIFICATE != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != '' && vars.WINDOWS_CERTIFICATE_THUMBPRINT != '' && vars.WINDOWS_TIMESTAMP_URL != '' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact_name: downmark-macos-aarch64
            tauri_args: --target aarch64-apple-darwin
            bundle_args: dmg
            artifact_paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - platform: macos-latest
            artifact_name: downmark-macos-x86_64
            tauri_args: --target x86_64-apple-darwin
            bundle_args: dmg
            artifact_paths: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - platform: windows-latest
            artifact_name: downmark-windows
            tauri_args:
            bundle_args: nsis,msi
            artifact_paths: |
              src-tauri/target/release/bundle/**/*.exe
              src-tauri/target/release/bundle/**/*.msi

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Announce unsigned macOS DMG packaging
        if: runner.os == 'macOS' && env.HAS_APPLE_RELEASE_SIGNING != 'true'
        shell: bash
        run: |
          echo "Building unsigned macOS DMG because signing and notarization secrets are not configured."

      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && env.HAS_APPLE_RELEASE_SIGNING == 'true'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          CERT_ID="$(security find-identity -v -p codesigning build.keychain | sed -n 's/.*"\\(.*\\)".*/\\1/p' | head -n 1)"
          if [ -z "$CERT_ID" ]; then
            echo "No macOS signing identity was imported." >&2
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "APPLE_ID=$APPLE_ID" >> "$GITHUB_ENV"
          echo "APPLE_PASSWORD=$APPLE_PASSWORD" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"

      - name: Import Windows signing certificate
        id: windows_signing
        if: runner.os == 'Windows' && env.HAS_WINDOWS_SIGNING == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ vars.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_DIGEST_ALGORITHM: ${{ vars.WINDOWS_DIGEST_ALGORITHM }}
          WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP "downmark-signing-cert.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $securePassword = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword | Out-Null

          $digestAlgorithm = $env:WINDOWS_DIGEST_ALGORITHM
          if ([string]::IsNullOrWhiteSpace($digestAlgorithm)) {
            $digestAlgorithm = "sha256"
          }

          $config = @{
            bundle = @{
              windows = @{
                certificateThumbprint = $env:WINDOWS_CERTIFICATE_THUMBPRINT
                digestAlgorithm = $digestAlgorithm
                timestampUrl = $env:WINDOWS_TIMESTAMP_URL
              }
            }
          } | ConvertTo-Json -Depth 5

          $configPath = Join-Path $env:GITHUB_WORKSPACE "src-tauri/tauri.windows.conf.json"
          Set-Content -Path $configPath -Value $config -Encoding utf8
          "extra_args=--config src-tauri/tauri.windows.conf.json" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build release bundles
        run: npm run tauri -- build --bundles ${{ matrix.bundle_args }} ${{ matrix.tauri_args }} ${{ steps.windows_signing.outputs.extra_args }}

      - name: Repack unsigned macOS DMG
        if: runner.os == 'macOS' && env.HAS_APPLE_RELEASE_SIGNING != 'true'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          dmgs=(src-tauri/target/*/release/bundle/dmg/*.dmg)
          if [ "${#dmgs[@]}" -eq 0 ]; then
            echo "Expected at least one macOS DMG to repack." >&2
            exit 1
          fi

          for dmg in "${dmgs[@]}"; do
            bash ./scripts/repack-unsigned-macos-dmg.sh "$dmg"
          done

      - name: Upload release bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ github.sha }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          retention-days: 14

  publish-main-build-release:
    needs: build-release-bundles
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download built bundles
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts
          pattern: downmark-*-${{ github.sha }}

      - name: Prepare public release assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob globstar

          copy_optional() {
            local pattern="$1"
            local destination="$2"
            local label="$3"
            local matches=( $pattern )

            if [ "${#matches[@]}" -eq 0 ]; then
              echo "- ${label}: unavailable in this build" >> main-build-notes.md
              return
            fi

            cp "${matches[0]}" "$destination"
            echo "- ${label}: $(basename "$destination")" >> main-build-notes.md
          }

          mkdir -p public-release

          cat > main-build-notes.md <<EOF
          Latest successful build from \`main\`.

          Commit: \`${GITHUB_SHA}\`
          Generated: $(date -u +"%Y-%m-%d %H:%M:%SZ")

          macOS packaging:
          - If Apple signing secrets are configured, macOS assets are notarized DMGs.
          - Otherwise, macOS assets are unsigned DMGs containing an ad-hoc signed app and may require bypassing Gatekeeper locally.

          Opening unsigned macOS builds:
          1. Open the DMG and drag Downmark into Applications.
          2. Control-click the app and choose Open on the first launch.
          3. If macOS still blocks it, use System Settings > Privacy & Security > Open Anyway.

          Assets:
          EOF

          copy_optional "downloaded-artifacts/downmark-macos-aarch64-${GITHUB_SHA}/**/*.dmg" \
            "public-release/Downmark-darwin-aarch64.dmg" \
            "Apple Silicon macOS"
          copy_optional "downloaded-artifacts/downmark-macos-x86_64-${GITHUB_SHA}/**/*.dmg" \
            "public-release/Downmark-darwin-x64.dmg" \
            "Intel macOS"
          copy_optional "downloaded-artifacts/downmark-windows-${GITHUB_SHA}/**/*setup.exe" \
            "public-release/Downmark-windows-x64-setup.exe" \
            "Windows installer (.exe)"
          copy_optional "downloaded-artifacts/downmark-windows-${GITHUB_SHA}/**/*.msi" \
            "public-release/Downmark-windows-x64.msi" \
            "Windows installer (.msi)"

          if ! compgen -G "public-release/*" >/dev/null; then
            echo "No public release assets were produced." >&2
            exit 1
          fi

          ls -lah public-release

      - name: Publish rolling main-build release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if gh release view main-build >/dev/null 2>&1; then
            gh release delete main-build --yes --cleanup-tag
          fi

          gh release create main-build \
            --target "${GITHUB_SHA}" \
            --title "Downmark main build" \
            --notes-file main-build-notes.md \
            --prerelease \
            public-release/*
