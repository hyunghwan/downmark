name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ""
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_CERTIFICATE_THUMBPRINT: ${{ vars.WINDOWS_CERTIFICATE_THUMBPRINT }}
      WINDOWS_DIGEST_ALGORITHM: ${{ vars.WINDOWS_DIGEST_ALGORITHM }}
      WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Verify release version matches the tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          node --input-type=module <<'EOF'
          import fs from "node:fs";

          const packageVersion = JSON.parse(fs.readFileSync("package.json", "utf8")).version;
          const tauriVersion = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8")).version;
          const cargoToml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          const cargoVersion = cargoToml.match(/^version = "(.+)"$/m)?.[1];
          const tagVersion = process.env.GITHUB_REF_NAME.replace(/^v/, "");

          const versions = {
            tagVersion,
            packageVersion,
            tauriVersion,
            cargoVersion,
          };

          if (new Set(Object.values(versions)).size !== 1) {
            console.error("Release version mismatch:", versions);
            process.exit(1);
          }
          EOF

      - name: Install npm dependencies
        run: npm ci

      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != '' && env.APPLE_CERTIFICATE_PASSWORD != '' && env.KEYCHAIN_PASSWORD != ''
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          CERT_ID="$(security find-identity -v -p codesigning build.keychain | sed -n 's/.*"\\(.*\\)".*/\\1/p' | head -n 1)"
          if [ -z "$CERT_ID" ]; then
            echo "No macOS signing identity was imported." >&2
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      - name: Import Windows signing certificate
        id: windows_signing
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE != '' && env.WINDOWS_CERTIFICATE_PASSWORD != '' && env.WINDOWS_CERTIFICATE_THUMBPRINT != '' && env.WINDOWS_TIMESTAMP_URL != ''
        shell: pwsh
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP "downmark-signing-cert.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $securePassword = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword | Out-Null

          $digestAlgorithm = $env:WINDOWS_DIGEST_ALGORITHM
          if ([string]::IsNullOrWhiteSpace($digestAlgorithm)) {
            $digestAlgorithm = "sha256"
          }

          $config = @{
            bundle = @{
              windows = @{
                certificateThumbprint = $env:WINDOWS_CERTIFICATE_THUMBPRINT
                digestAlgorithm = $digestAlgorithm
                timestampUrl = $env:WINDOWS_TIMESTAMP_URL
              }
            }
          } | ConvertTo-Json -Depth 5

          $configPath = Join-Path $env:GITHUB_WORKSPACE "src-tauri/tauri.windows.conf.json"
          Set-Content -Path $configPath -Value $config -Encoding utf8
          "extra_args=--config src-tauri/tauri.windows.conf.json" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build and upload release artifacts
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ env.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ env.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ env.APPLE_ID }}
          APPLE_PASSWORD: ${{ env.APPLE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
        with:
          tagName: v__VERSION__
          releaseName: Downmark v__VERSION__
          releaseBody: See the assets below to download the macOS and Windows builds.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          releaseAssetNamePattern: "[name]-[version]-[platform]-[arch][setup][ext]"
          args: ${{ format('{0} {1}', matrix.args, steps.windows_signing.outputs.extra_args) }}
